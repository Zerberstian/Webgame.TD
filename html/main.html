<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tower Defense</title>

    <link rel="stylesheet" href="../css/main.css">
</head>
<body>
    <!-- Canvas Layer: Zeichen-Fläche für Spielobjekte (wird per JS verborgen/angezeigt) -->
    <div id="canvas">
        <canvas id="game-canvas"></canvas>
    </div>
    
    <!-- UI Layer: Menü und Screens (liegt über Canvas mit z-index) -->
    <div id="ui">

        <!-- Hauptmenü: Startbildschirm -->
        <div id="main-menu" class="screen">
            <h1>MAIN MENU</h1>
            <button id="new-game">new Game</button>
            <button id="load-game">Load Game</button>
            <button id="skill-tree-button">Skill Tree</button>
        </div>

        <!-- Spielmenü: Zwischenschirm vor dem eigentlichen Gameplay -->
        <div id="game-menu" class="screen hidden">
            <h1>Game Menu</h1>
            <button id="back-to-menu" class="backbutton">Back to Menu</button>
            <button id="wave">Wave</button>
        </div>

        <!-- Spielscreen: Canvas + UI werden hier angezeigt -->
        <div id="game-screen" class="screen hidden ">
            <button id="back-to-menu-gs" class="backbutton">Back to Menu</button>
        </div>

        <!-- Skilltree: Upgrades und Verbesserungen -->
        <div id="skill-tree-screen" class="screen hidden">
            <h1>SKILL TREE</h1>
            <ul>
                <li>Upgrade 1</li>
                <li>Upgrade 2</li>
                <li>Upgrade 3</li>
            </ul>
            <button id="back-to-menu-st" class="backbutton">Back to Menu</button>
        </div>

    </div>

    <!-- CORE -->
    <script src="../js/core/canvas.js"></script>
    <script src="../js/main.js"></script>

    <!-- UI -->
    <script src="../js/ui/screens.js"></script>
    <script src="../js/core/hotkeys.js"></script>

    <!-- entities   -->
    <script src="../js/entities/tower.js"></script>
    <script src="../js/entities/enemy.js"></script>
</body>
</html>
