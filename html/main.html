<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tower Defense</title>

    <link rel="stylesheet" href="../css/main.css">
</head>
<body>
    <div id="canvas">
        <canvas id="game-canvas"></canvas>
    </div>
    <div id="ui">

        <div id="main-menu" class="screen">
            <h1>MAIN MENU</h1>

            <button id="new-game">
                new Game
            </button>
            
            <button id="load-game">
                Load Game
            </button>
        
            <button id="skill-tree-button">
                Skill Tree
            </button>
        </div>

        <div id="game-menu" class="screen hidden">
            <h1>Game Menu</h1>
            <button id="back-to-menu" onclick="showScreen('main-menu')">
                Back to Menu
            </button>

            <button id="wave" onclick="showScreen('game-screen')">
                Wave
            </button>

        </div>

        <div id ="game-screen" class="screen hidden">
            <h1>GAME UI</h1>
            <button id="back-to-menu-button" onclick="showScreen('main-menu')">
                Back to Menu
            </button>
        </div>

        <div id="skill-tree-screen" class="screen hidden">
            <h1>SKILL TREE</h1>
            <ul>
                <li>Upgrade 1</li>
                <li>Upgrade 2</li>
                <li>Upgrade 3</li>
            </ul>
            <button id="back-to-menu" onclick="showScreen('main-menu')">
                Back to Menu
            </button>
        </div>

    </div>

    <!-- CORE -->
    <script src="../js/core/canvas.js"></script>
    <script src="../js/main.js"></script>

    <!-- UI -->
    <script src="../js/ui/screens.js"></script>
</body>
</html>
