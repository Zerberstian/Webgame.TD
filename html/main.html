<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tower Defense</title>

    <link rel="stylesheet" href="../css/main.css">
</head>
<body>

    <canvas id="game-canvas"></canvas>

    <div id="ui">

        <div id="main-menu" class="screen">
            <h1>MAIN MENU</h1>

            <button onclick="showScreen('game-screen')">
                Start Game
            </button>

            <button onclick="showScreen('skill-tree')">
                Skill Tree
            </button>
        </div>

        <div id="game-screen" class="screen hidden">
            <h1>GAME UI</h1>
            <button onclick="showScreen('main-menu')">
                Back to Menu
            </button>
        </div>

        <div id="skill-tree" class="screen hidden">
            <h1>SKILL TREE</h1>
            <ul>
                <li>Upgrade 1</li>
                <li>Upgrade 2</li>
                <li>Upgrade 3</li>
            </ul>
            <button onclick="showScreen('main-menu')">
                Back to Menu
            </button>
        </div>

    </div>

    <!-- CORE -->
    <script src="../js/core/canvas.js"></script>

    <!-- UI -->
    <script src="../js/ui/screens.js"></script>
</body>
</html>
